name: Fresh Linux Bootstrap

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Bootstrap in ${{ matrix.image }}
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.image }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ["debian:trixie", "ubuntu:24.04"]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-go@v6
        with:
          go-version-file: dots/go.mod

      - name: Run fresh bootstrap smoke
        working-directory: dots
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: go run ./cmd/fresh-linux-bootstrap-smoke --image "${{ matrix.image }}" --repo-root "${{ github.workspace }}"

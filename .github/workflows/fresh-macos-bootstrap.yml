name: Fresh macOS Bootstrap

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Bootstrap on ${{ matrix.os }}
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.os }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        os: [macos-26, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: dots/go.mod

      - name: Install Rust toolchain (needed for cargo-installed tools)
        uses: dtolnay/rust-toolchain@stable

      - name: Run fresh bootstrap smoke
        working-directory: dots
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: go run ./cmd/fresh-macos-bootstrap-smoke --repo-root "${{ github.workspace }}"

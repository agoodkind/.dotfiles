# Declarative agent-corpus fan-out.
#
# Each [[output]] writes one artifact from corpus/ to a user-wide destination.
# The dots sync engine loads this file, joins each dest onto $HOME, skips rows
# whose optional os does not match the running OS, and dispatches on kind.
#
# kind values:
#   skills                rendered skill directories (needs ref_style)
#   rule-files            each rule written as a marker-stamped file (needs rule_ext)
#   instruction-doc       all rules concatenated into one document (needs title)
#   per-file-instructions each rule rendered as a .instructions.md file
#
# ref_style values (skills only): mdc | md
#
# Codex, VSCode Copilot, Cursor, and Zed read shared skills from ~/.agents/skills.
# Codex needs [features] skills = true in ~/.codex/config.toml.
# Claude Code and Claude Desktop read skills from ~/.claude/skills.
# VSCode also reads ~/.copilot/instructions, ~/.claude/rules, and ~/.agents/skills.
# Claude Desktop shares ~/.claude with Claude Code.
# Cursor global user rules are uploaded to the cloud API during dots sync (not from ~/.cursor/rules).

# Claude Code (and Claude Desktop)
[[output]]
provider  = "claude"
kind      = "skills"
dest      = ".claude/skills"
ref_style = "md"

[[output]]
provider   = "claude"
kind       = "rule-files"
dest       = ".claude/rules"
rule_ext   = ".md"
skill_dest = ".claude/skills"

[[output]]
provider   = "claude"
kind       = "instruction-doc"
dest       = ".claude/CLAUDE.md"
title      = "Claude Memory"
skill_dest = ".claude/skills"

# Shared cross-agent directory (read by Zed, VSCode, and Codex)
[[output]]
provider  = "agents"
kind      = "skills"
dest      = ".agents/skills"
ref_style = "mdc"

[[output]]
provider   = "agents"
kind       = "rule-files"
dest       = ".agents/rules"
rule_ext   = ".mdc"
skill_dest = ".agents/skills"

# Codex
[[output]]
provider   = "codex"
kind       = "instruction-doc"
dest       = ".codex/AGENTS.md"
title      = "Codex Instructions"
skill_dest = ".agents/skills"

# Gemini
[[output]]
provider   = "gemini"
kind       = "instruction-doc"
dest       = ".gemini/GEMINI.md"
title      = "Gemini Instructions"
skill_dest = ".agents/skills"

# GitHub Copilot
[[output]]
provider   = "copilot"
kind       = "instruction-doc"
dest       = ".copilot/copilot-instructions.md"
title      = "Copilot Instructions"
skill_dest = ".agents/skills"

[[output]]
provider   = "copilot"
kind       = "per-file-instructions"
dest       = ".copilot/instructions"
skill_dest = ".agents/skills"

# Zed (first-party agent reads user-global rules from this doc)
[[output]]
provider   = "zed"
kind       = "instruction-doc"
dest       = ".config/zed/AGENTS.md"
title      = "Zed Instructions"
skill_dest = ".agents/skills"

title = "dotfiles gitleaks config"

[extend]
# Extend the default gitleaks ruleset shipped with the binary.
useDefault = true

# ─── Allowlists ───────────────────────────────────────────────────────────────

[allowlist]
  description = "Files that intentionally contain patterns that look like secrets"
  paths = [
    # The deny-patterns files contain regex literals that would trip secret scanners.
    '''.githooks/deny-patterns''',
    '''.githooks/deny-patterns.local.example''',
    # gitleaks config itself may reference pattern strings.
    '''.gitleaks.toml''',
  ]
  # Known-safe example values in documentation / example files.
  regexes = [
    # Placeholder values used in example configs.
    '''YOUR_.*_HERE''',
    '''your-.*-key''',
    '''example\.com''',
  ]

# ─── Custom rules ─────────────────────────────────────────────────────────────

[[rules]]
  id = "dotfiles-ssh-private-key-inline"
  description = "Inline SSH private key content"
  regex = '''-----BEGIN [A-Z ]*PRIVATE KEY[A-Z -]*-----'''
  tags = ["key", "ssh"]

[[rules]]
  id = "dotfiles-generic-api-token"
  description = "Generic API token assignment"
  regex = '''(?i)(api[_-]?token|api[_-]?key|access[_-]?token)\s*[=:]\s*['"]?[A-Za-z0-9_\-]{20,}['"]?'''
  tags = ["token", "api"]

[[rules]]
  id = "dotfiles-generic-secret-assignment"
  description = "Generic password/secret/credential assignment"
  regex = '''(?i)(password|passwd|secret|auth[_-]?key|access[_-]?key|private[_-]?key|credentials?|passphrase)[^\S\n]*[=:][^\S\n]*['"]?[^\s'"<>\$\{]{8,}['"]?'''
  tags = ["secret"]
  [rules.allowlist]
    regexTarget = "line"
    regexes = [
      '''(?i)(your[_-]|change[_-]?me|placeholder|redacted|xxxx|example|<[^>]+>|\$\{[^}]+\}|\{\{[^}]+\}\}|TODO|FIXME)''',
      # op:// paths are 1Password references, not credentials
      '''op://''',
      # YAML required: true/false declarations are not credentials
      '''(?i)(password|secret|passphrase)[^=\n]*:\s*(true|false)''',
    ]

[[rules]]
  id = "dotfiles-lm-studio-token"
  description = "LM Studio API token"
  regex = '''sk-lm-[A-Za-z0-9]{8}:[A-Za-z0-9]{16,}'''
  tags = ["secret", "api-key"]

[[rules]]
  id = "dotfiles-jwt"
  description = "JSON Web Token"
  regex = '''eyJ[A-Za-z0-9_-]{10,}\.eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}'''
  tags = ["secret", "jwt"]

[[rules]]
  id = "dotfiles-connection-string"
  description = "Database connection string with embedded credentials"
  regex = '''(?i)(postgres|mysql|mongodb|redis|amqp|rabbitmq)://[^:@\s]+:[^@\s]{4,}@'''
  tags = ["secret", "connection-string"]

[[rules]]
  id = "dotfiles-bearer-token"
  description = "Bearer token in Authorization header"
  regex = '''(?i)Authorization['":\s]+Bearer\s+[A-Za-z0-9\-._~+/]{20,}'''
  tags = ["secret", "token"]

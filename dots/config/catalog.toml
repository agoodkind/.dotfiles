[[tool]]
id = "starship"
bin = "starship"
repo = "starship/starship"
install_method = "script"
script_url = "https://starship.rs/install.sh"
script_args = ["--yes", "--bin-dir", "$HOME/.local/bin"]

[[tool]]
id = "fastfetch"
bin = "fastfetch"
repo = "fastfetch-cli/fastfetch"
